# 仅部署 ingestor：PostgreSQL + FastAPI server
# 在仓库根目录执行：docker compose -f ingestor/compose.yaml up -d
# 或在 ingestor 目录：docker compose up -d

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dataline}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dataline}
      POSTGRES_DB: ${POSTGRES_DB:-dataline}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dataline}"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${SERVER_PORT:-8000}:8000"
    environment:
      DATALINE_DATABASE_URL: postgresql://${POSTGRES_USER:-dataline}:${POSTGRES_PASSWORD:-dataline}@postgres:5432/${POSTGRES_DB:-dataline}
      DATALINE_CORS_ORIGINS: ${DATALINE_CORS_ORIGINS:-'["http://localhost:3000"]'}
      DATALINE_DEBUG: ${DEBUG:-false}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
