services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dataline}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dataline}
      POSTGRES_DB: ${POSTGRES_DB:-dataline}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dataline}"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./ingestor
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${SERVER_PORT:-8000}:8000"
    environment:
      DATALINE_DATABASE_URL: postgresql://${POSTGRES_USER:-dataline}:${POSTGRES_PASSWORD:-dataline}@postgres:5432/${POSTGRES_DB:-dataline}
      DATALINE_CORS_ORIGINS: '["http://localhost:3000","http://admin:3000"]'
      DATALINE_DEBUG: ${DEBUG:-false}
    depends_on:
      postgres:
        condition: service_healthy

  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${ADMIN_PORT:-3000}:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:${SERVER_PORT:-8000}/api
      BACKEND_URL: http://server:8000
    depends_on:
      - server

volumes:
  pgdata:
